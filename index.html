        si.textContent = sub.label;
        si.onclick = function(e){ e.stopPropagation(); navigate(sec.id, sub.id); };
        sb.appendChild(si);
      });
    }
  });
}

function navigate(sectionId, subId) {
  for (var k in RS) delete RS[k]; rsIdx = 0;
  state.sectionId = sectionId; state.subId = subId;
  state.typeTab = 'clarify'; state.searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderSidebar(); renderMain();
}

function renderMain() {
  if (state.searchQuery) { renderSearch(); return; }
  if (!state.sectionId) { renderHome(); return; }
  var sec = DATA.sections.find(function(s){ return s.id === state.sectionId; });
  if (!sec) return;
  if (sec.isOpeners) { renderOpeners(sec); return; }
  if (sec.isShortcuts) { renderShortcuts(sec); return; }
  renderSection(sec);
}

function renderHome() {
  var html = '<div class="home-header fade-in"><h1>Chat Response Tool</h1><p>Select a topic — or search above.</p></div><div class="home-grid fade-in">';
  DATA.sections.forEach(function(sec) {
    html += '<div class="topic-card" onclick="navigate(\''+sec.id+'\',null)">'
      +'<div class="card-pip" style="background:'+sec.colorLight+';font-size:11px;font-weight:700;color:'+sec.color+'">'+esc(sec.emoji)+'</div>'
      +'<div class="card-title">'+esc(sec.label)+'</div>'
      +'<div class="card-sub">'+esc(sec.desc)+'</div></div>';
  });
  html += '</div>';
  document.getElementById('main').innerHTML = html;
}

function renderSection(sec) {
  var activeSub = sec.subs ? (state.subId ? sec.subs.find(function(s){ return s.id===state.subId; }) : sec.subs[0]) : null;
  var block = activeSub || (sec.blocks ? sec.blocks[0] : null);
  if (!block) return;
  var html = '<div class="fade-in"><div class="section-header">'
    +'<div class="section-pip" style="background:'+sec.colorLight+';font-size:11px;font-weight:700;color:'+sec.color+'">'+esc(sec.emoji)+'</div>'
    +'<div><div class="section-title">'+esc(sec.label)+'</div>'
    +'<div class="section-desc">'+esc(sec.desc)+'</div></div></div>';
  if (sec.subs) {
    html += '<div class="sub-tabs">';
    sec.subs.forEach(function(sub) {
      var a = (state.subId===sub.id)||(!state.subId&&sub===sec.subs[0]);
      html += '<div class="sub-tab'+(a?' active':'')+'" onclick="navigate(\''+sec.id+'\',\''+sub.id+'\')">'+esc(sub.label)+'</div>';
    });
    html += '</div>';
  }
  if (block.criticalCheck) {
    html += '<div class="critical-note"><div class="critical-note-header">IMPORTANT — Complete Before Responding</div><div class="critical-note-body">';
    block.criticalCheck.forEach(function(line) {
      html += '<div style="margin-bottom:6px">'+esc(line).replace(/(STEP \d+:|IMPORTANT:|DO NOT|IF YES —|IF NO —)/g,'<span class="step">$1</span>')+'</div>';
    });
    html += '</div></div>';
  }
  var tabs = [{id:'clarify',label:'Clarifying Questions'},{id:'hold',label:'Holding Messages'},{id:'resolve',label:'Resolution Messages'},{id:'inactivity',label:'Inactivity Nudges'}];
  if (block.scenarios) tabs.push({id:'scenarios',label:'Scenarios'});
  if (block.talkingPoints) tabs.push({id:'talkingpoints',label:'Talking Points'});
  if (block.marketRefs) tabs.push({id:'marketrefs',label:'Market UA Refs'});
  html += '<div class="type-tabs">';
  tabs.forEach(function(t) { html += '<div class="type-tab'+(state.typeTab===t.id?' active':'')+'" onclick="setTypeTab(\''+t.id+'\')">'+t.label+'</div>'; });
  html += '</div>'+renderTypeContent(block)+'</div>';
  document.getElementById('main').innerHTML = html;
}

function setTypeTab(tab) {
  state.typeTab = tab;
  var sec = DATA.sections.find(function(s){ return s.id===state.sectionId; });
  if (sec) renderSection(sec);
}

function renderTypeContent(block) {
  var html = '', tab = state.typeTab;
  if (tab==='clarify') {
    if (block.clarifyNote) html += '<div class="agent-note"><strong>AGENT NOTE</strong> '+esc(block.clarifyNote)+'</div>';
    html += '<div class="responses-grid">';
    (block.clarify||[]).forEach(function(r,i){ html += responseItem(r,i+1); });
    html += '</div>';
  }
  if (tab==='hold') {
    if (block.holdNote) html += '<div class="agent-note"><strong>AGENT NOTE</strong> '+esc(block.holdNote)+'</div>';
    html += '<div class="responses-grid">';
    (block.hold||[]).forEach(function(r,i){ html += responseItem(r,i+1); });
    html += '</div>';
  }
  if (tab==='resolve') {
    if (block.resolveNote) html += '<div class="agent-note"><strong>AGENT NOTE</strong> '+esc(block.resolveNote)+'</div>';
    html += '<div class="responses-grid">';
    (block.resolve||[]).forEach(function(r,i){ html += responseItem(r,i+1); });
    html += '</div>';
  }
  if (tab==='inactivity') {
    var nudges = ["I noticed I haven't heard back from you yet. After two minutes of inactivity the chat will automatically close.","Just checking in — I noticed things have gone quiet on your end. After two minutes of inactivity the chat will automatically close. If you still need help, please reply and I'll be happy to continue!","Hi there, just a gentle reminder that I'm still here if you need me. After two minutes of inactivity the chat will automatically close — please respond if you'd like to continue."];
    html += '<div class="agent-note"><strong>AGENT NOTE</strong> Send when the chat bubble turns yellow with ZZZs. Wait 2 minutes after sending, then close the chat if no reply.</div>';
    html += '<div class="responses-grid">';
    nudges.forEach(function(r,i){ html += responseItem(r,i+1); });
    html += '</div>';
  }
  if (tab==='scenarios' && block.scenarios) {
    html += '<div class="scenario-section">';
    block.scenarios.forEach(function(s) {
      html += '<div class="scenario-label">'+esc(s.label)+'</div>';
      s.responses.forEach(function(r) {
        var k=store(r);
        html += '<div class="scenario-bubble" data-key="'+k+'">'+escNl(r)+'<button class="scenario-copy" onclick="event.stopPropagation();copyStoredParent(this)">Copy</button></div>';
      });
    });
    html += '</div>';
  }
  if (tab==='talkingpoints' && block.talkingPoints) {
    var tp = block.talkingPoints;
    html += '<div class="tp-box"><div class="tp-header">Approved Company Talking Points</div><div class="tp-intro">'+esc(tp.intro)+'</div>';
    tp.items.forEach(function(item) { html += '<div class="tp-item"><div class="tp-q">Q: '+esc(item.q)+'</div><div class="tp-a">'+esc(item.a)+'</div></div>'; });
    html += '</div>';
  }
  if (tab==='marketrefs' && block.marketRefs) {
    html += '<div class="market-box"><div class="market-box-header">User Agreement References by Market</div>';
    block.marketRefs.forEach(function(m) {
      html += '<div class="market-entry"><div class="market-name">'+esc(m.market)+'</div><div class="market-url">'+esc(m.url)+'</div><div class="market-quote">"'+esc(m.excerpt)+'"</div></div>';
    });
    html += '</div>';
  }
  return html;
}

function responseItem(text, num) {
  var k=store(text), preview=text.length>120?text.substring(0,120)+'...':text;
  return '<div class="response-item" onclick="toggleResponse(this)" data-key="'+k+'">'
    +'<div class="response-preview"><div class="response-num">'+num+'</div>'
    +'<div class="response-text">'+esc(preview.replace(/\n/g,' '))+'</div></div>'
    +'<div class="response-actions">'
    +'<button class="btn-copy" onclick="event.stopPropagation();copyStoredParent(this)">Copy to clipboard</button>'
    +'<button class="btn-collapse" onclick="event.stopPropagation();this.closest(\'.response-item\').classList.remove(\'expanded\')">Collapse</button>'
    +'</div>'
    +'<div style="display:none" class="response-full">'+escNl(text)+'</div></div>';
}

function toggleResponse(el) {
  var wasExp = el.classList.contains('expanded');
  document.querySelectorAll('.response-item.expanded').forEach(function(e){ e.classList.remove('expanded'); });
  if (!wasExp) {
    el.classList.add('expanded');
    var preview = el.querySelector('.response-text'), full = el.querySelector('.response-full');
    if (full) preview.innerHTML = full.innerHTML;
  }
}

function renderOpeners(sec) {
  var html = '<div class="fade-in"><div class="section-header">'
    +'<div class="section-pip" style="background:'+sec.colorLight+';font-size:11px;font-weight:700;color:'+sec.color+'">'+esc(sec.emoji)+'</div>'
    +'<div><div class="section-title">'+esc(sec.label)+'</div>'
    +'<div class="section-desc">Fill in <strong>[Name]</strong> and <strong>[SUMMARY]</strong> before sending.</div></div></div>';
  sec.openers.forEach(function(opener) {
    var k=store(opener.text);
    html += '<div class="opener-card" onclick="this.classList.toggle(\'expanded\')">'
      +'<div class="opener-header"><div><div class="opener-label">'+esc(opener.label)+'</div>'
      +'<div class="opener-desc">'+esc(opener.desc)+'</div></div>'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>'
      +'<div class="opener-body"><div class="opener-text">'+escNl(opener.text)+'</div>'
      +'<button class="btn-copy" data-key="'+k+'" onclick="event.stopPropagation();copyStored(this.dataset.key,this)">Copy to clipboard</button>'
      +'</div></div>';
  });
  html += '</div>';
  document.getElementById('main').innerHTML = html;
}

function renderShortcuts(sec) {
  var catColors={"Opening / Greeting":"#E8F8F3","Empathy":"#EEF0FD","Info Gathering / Next Steps":"#FFF8E8","Waiting / Response Mgmt":"#F0F4FF","Transfer":"#FFF0E8","Resolution / Closing":"#E8F8F3","Cooperation / Limitation Closing":"#F5F0FF","Payment Review / Security":"#FFF3F0","General / Miscellaneous":"#F5F5F3","Compliance & Legal":"#EAF0F8"};
  var catTxt={"Opening / Greeting":"#0A6B4A","Empathy":"#3D3DA0","Info Gathering / Next Steps":"#8A5C00","Waiting / Response Mgmt":"#2355A0","Transfer":"#A03020","Resolution / Closing":"#0A6B4A","Cooperation / Limitation Closing":"#5B3EA0","Payment Review / Security":"#8B2500","General / Miscellaneous":"#555555","Compliance & Legal":"#1A3A5C"};
  var lastCat=null, rows='';
  sec.shortcuts.forEach(function(row) {
    var isNew=row.cat!==lastCat; lastCat=row.cat;
    var fill=catColors[row.cat]||'#F5F5F3', tc=catTxt[row.cat]||'#333';
    var k=store(row.msg), prev=row.msg.length>100?row.msg.substring(0,100)+'...':row.msg;
    rows += '<tr><td style="background:'+(isNew?fill:'white')+';font-size:12px;font-weight:'+(isNew?600:400)+';color:'+(isNew?tc:'#aaa')+'">'+esc(isNew?row.cat:'')+'</td>'
      +'<td><span class="qr-sc">'+esc(row.sc)+'</span></td>'
      +'<td style="font-size:12px;color:#333">'+esc(prev)+'</td>'
      +'<td><button class="qr-copy" data-key="'+k+'" onclick="copyStored(this.dataset.key,this)">Copy</button></td></tr>';
  });
  var html = '<div class="fade-in"><div class="section-header">'
    +'<div class="section-pip" style="background:'+sec.colorLight+';font-size:11px;font-weight:700;color:'+sec.color+'">'+esc(sec.emoji)+'</div>'
    +'<div><div class="section-title">'+esc(sec.label)+'</div><div class="section-desc">Type shortcut in chat to trigger. Case-sensitive.</div></div></div>'
    +'<div style="overflow-x:auto"><table class="qr-table"><thead><tr><th style="width:180px">Category</th><th style="width:90px">Shortcut</th><th>Message</th><th style="width:70px"></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  document.getElementById('main').innerHTML = html;
}

function renderSearch() {
  var q=state.searchQuery.toLowerCase(), results=[];
  DATA.sections.forEach(function(sec) {
    if (sec.isOpeners) { sec.openers.forEach(function(o){ if((o.text+o.label+o.desc).toLowerCase().indexOf(q)>=0) results.push({topic:sec.label,type:o.label,text:o.text}); }); return; }
    if (sec.isShortcuts) { sec.shortcuts.forEach(function(s){ if((s.msg+s.sc+s.cat).toLowerCase().indexOf(q)>=0) results.push({topic:sec.label,type:s.sc+' — '+s.cat,text:s.msg}); }); return; }
    function sb(block, topicLabel) {
      ['clarify','hold','resolve'].forEach(function(t){ (block[t]||[]).forEach(function(r){ if(r.toLowerCase().indexOf(q)>=0) results.push({topic:topicLabel,type:t,text:r}); }); });
      if(block.scenarios) block.scenarios.forEach(function(s){ s.responses.forEach(function(r){ if(r.toLowerCase().indexOf(q)>=0) results.push({topic:topicLabel,type:s.label,text:r}); }); });
    }
    if (sec.subs) sec.subs.forEach(function(sub){ sb(sub,sec.label+' > '+sub.label); });
    else if (sec.blocks) sec.blocks.forEach(function(b){ sb(b,sec.label); });
  });
  if (!results.length) { document.getElementById('main').innerHTML = '<div class="sr-empty">No results for "'+esc(state.searchQuery)+'".</div>'; return; }
  var html='<div class="fade-in"><div style="margin-bottom:20px;font-size:14px;color:var(--text-muted)">'+results.length+' result'+(results.length===1?'':'s')+' for "<strong>'+esc(state.searchQuery)+'</strong>"</div><div class="search-results">';
  results.slice(0,30).forEach(function(r){
    var k=store(r.text);
    html+='<div class="search-result-item"><div class="sr-topic">'+esc(r.topic)+'</div><div class="sr-type">'+esc(r.type)+'</div><div class="sr-text">'+esc(r.text.replace(/\n/g,' '))+'</div><div style="margin-top:10px"><button class="btn-copy" style="font-size:12px;padding:6px 12px" data-key="'+k+'" onclick="copyStored(this.dataset.key,this)">Copy</button></div></div>';
  });
  html+='</div></div>';
  document.getElementById('main').innerHTML = html;
}

var searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  var val=this.value;
  searchTimeout=setTimeout(function(){ state.searchQuery=val.trim(); if(state.searchQuery){renderSidebar();renderSearch();}else{renderMain();} },200);
});

renderSidebar();
renderHome();

function checkPassword() {
  var input = document.getElementById('passwordInput');
  var error = document.getElementById('passwordError');
  if (input.value === 'fleege') {
    document.getElementById('passwordGate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    sessionStorage.setItem('auth', '1');
  } else {
    error.style.display = 'block';
    input.value = '';
    input.focus();
  }
}
// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('auth') === '1') {
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('passwordGate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  });
}

</script>
